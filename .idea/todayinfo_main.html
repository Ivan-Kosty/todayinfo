<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI — Главная</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="header">
    <button class="logo-btn" onclick="window.location.reload()">TI</button>
    <div class="main-buttons">
        <button class="style-btn" onclick="window.location.href='main_currency.html'">КУРС</button>
        <button class="style-btn" onclick="alert('Погода')">ПОГОДА</button>
        <button class="style-btn" onclick="alert('Новости')">НОВОСТИ</button>
    </div>
</div>

<main>
    <div class="grid-2x2">
        <div class="cell">
            <div class="weather-info" id="weather-info">
                <div class="weather-loading">
                    <div class="loading-spinner"></div>
                    <span>Загрузка погоды...</span>
                </div>
            </div>
        </div>
        <div class="cell">
            <div class="news-info" id="news-info-1">
                <div class="news-loading">
                    <div class="loading-spinner-small"></div>
                    <span>Загрузка новостей...</span>
                </div>
            </div>
        </div>
        <div class="cell">
            <div id="currency-info">
                <div class="currency-loading">
                    <div class="loading-spinner-small"></div>
                    <span>Загрузка курсов...</span>
                </div>
            </div>
        </div>
        <div class="cell">
            <div class="news-info" id="news-info-2">
                <div class="news-loading">
                    <div class="loading-spinner-small"></div>
                    <span>Загрузка новостей...</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="weather.js"></script>
<script src="rates.js"></script>
<script src="news.js"></script>
</body>
</html>
