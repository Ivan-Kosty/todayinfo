<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI — Погода</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        (function(){try{var t=localStorage.getItem('ti-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}})();
    </script>
</head>
<body>
<div class="header">
    <button class="logo-btn" onclick="window.location.href='todayinfo_main.html'">TI</button>
    <div class="main-buttons">
        <button class="style-btn" onclick="window.location.href='todayinfo_main.html'">НАЗАД</button>
        <button class="theme-toggle" id="theme-toggle" aria-label="Сменить тему">
            <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </div>
</div>

<main>
    <div class="weather-page">
        <div class="weather-page-header">
            <h1 class="weather-page-title">Карта осадков</h1>
            <div class="weather-layers" id="weather-layers">
                <button class="layer-btn active" data-layer="radar">🌧 Осадки</button>
                <button class="layer-btn" data-layer="temp">🌡 Температура</button>
                <button class="layer-btn" data-layer="wind">💨 Ветер</button>
            </div>
        </div>
        <div class="weather-map-container" id="weather-map-container">
            <button class="weather-map-expand-btn" id="weather-map-expand-btn" title="Развернуть">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"/>
                    <polyline points="9 21 3 21 3 15"/>
                    <line x1="21" y1="3" x2="14" y2="10"/>
                    <line x1="3" y1="21" x2="10" y2="14"/>
                </svg>
            </button>
            <iframe
                id="weather-map"
                class="weather-map-iframe"
                src="https://embed.windy.com/embed2.html?lat=53.9&lon=27.57&detailLat=53.9&detailLon=27.57&width=650&height=450&zoom=6&level=surface&overlay=radar&product=radar&menu=&message=true&marker=&calendar=now&pressure=&type=map&location=coordinates&metricWindDefault=kt&temp=none&detail=true&lat=53.9&lon=27.57&zoom=6&overlay=radar"
                allowfullscreen
                loading="lazy"
            ></iframe>
        </div>
        <div class="weather-map-fullscreen-overlay" id="weather-map-fullscreen-overlay">
            <button class="weather-map-close-btn" id="weather-map-close-btn" title="Свернуть">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <iframe
                id="weather-map-fullscreen"
                class="weather-map-fullscreen-iframe"
                src=""
                allowfullscreen
                loading="lazy"
            ></iframe>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="footer-content">
        <span class="footer-logo">TI</span>
        <span class="footer-text">Погода · Новости · Курсы валют</span>
    </div>
</footer>

<script src="theme.js"></script>
<script src="weather-page.js"></script>
</body>
</html>
